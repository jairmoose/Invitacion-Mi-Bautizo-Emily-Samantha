<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Bautizo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fdfaf7;
            overflow: hidden;
        }

        .sobre-wrapper {
            position: relative;
            cursor: pointer;
            z-index: 10;
        }

        .imagen-sobre {
            display: block;
            width: 600px;
            max-width: 90vw;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transition: all 0.8s ease-in-out;
        }

        /* EFECTOS DE ANIMACIÓN */
        .abriendo .imagen-sobre {
            transform: scale(1.5);
            opacity: 0;
            filter: blur(15px);
        }

        .luz {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none;
            z-index: 20;
        }

        .animar-luz {
            animation: destello 1.5s ease-out forwards;
        }

        @keyframes destello {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; box-shadow: 0 0 20px white; }
            40% { transform: translate(-50%, -50%) scale(100); opacity: 1; box-shadow: 0 0 150px 80px white; }
            100% { transform: translate(-50%, -50%) scale(250); opacity: 0; }
        }

        .mariposa {
            position: absolute;
            width: 40px;
            height: 40px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23f7c1d1" d="M10,30 Q30,10 50,30 Q70,10 90,30 Q100,50 80,70 Q50,90 20,70 Q0,50 10,30 Z M50,30 V70"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
        }

        @keyframes volar {
            0% { transform: translate(-50%, -50%) scale(0.2) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(1.8) rotate(var(--r)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="sobre-wrapper" id="botonSobre">
        <img src="sobre.png" alt="Haz clic para abrir" class="imagen-sobre">
        <div class="luz" id="efecto-luz"></div>
    </div>

    <script>
        const boton = document.getElementById('botonSobre');
        const luz = document.getElementById('efecto-luz');
        const pdfLink = "https://drive.google.com/file/d/1sWA4ks4dYg3upvneGR3lwRjUnNwGB23s/view?usp=sharing";

        boton.addEventListener('click', () => {
            boton.classList.add('abriendo');
            luz.classList.add('animar-luz');

            for (let i = 0; i < 20; i++) {
                setTimeout(crearMariposa, i * 40);
            }

            setTimeout(() => {
                window.location.href = pdfLink;
            }, 1600);
        });

        function crearMariposa() {
            const m = document.createElement('div');
            m.className = 'mariposa';
            const angulo = Math.random() * Math.PI * 2;
            const distancia = 400 + Math.random() * 500;
            const x = Math.cos(angulo) * distancia + "px";
            const y = Math.sin(angulo) * distancia + "px";
            const r = (Math.random() * 1000) + "deg";

            m.style.setProperty('--x', x);
            m.style.setProperty('--y', y);
            m.style.setProperty('--r', r);
            m.style.left = "50%";
            m.style.top = "50%";
            m.style.animation = "volar 2.5s ease-out forwards";
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 2600);
        }
    </script>
</body>
</html>
