<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Bautizo - Emily Samantha</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #fdfaf7;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            cursor: pointer; /* Indica que toda la pantalla es clickeable */
        }

        .instruccion {
            color: #b5835a;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: latido 1.3s infinite;
            text-align: center;
        }

        @keyframes latido {
            0% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.5; transform: scale(0.95); }
        }

        .contenedor-sobre {
            position: relative;
            width: 85%;
            max-width: 500px;
        }

        .imagen-sobre {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.7s ease-in-out;
        }

        /* Efecto al abrir */
        .abriendo .imagen-sobre {
            transform: scale(2);
            opacity: 0;
            filter: blur(20px);
        }

        .luz {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
        }

        .animar-luz {
            animation: destello 1.2s ease-out forwards;
        }

        @keyframes destello {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(150); opacity: 1; box-shadow: 0 0 100px 50px white; }
            100% { transform: translate(-50%, -50%) scale(400); opacity: 0; }
        }
    </style>
</head>
<body onclick="abrirInvitacion()">

    <div class="instruccion" id="texto">✨ TOCA PARA ABRIR ✨</div>

    <div class="contenedor-sobre" id="sobre">
        <img src="sobre.png" alt="Sobre" class="imagen-sobre">
        <div class="luz" id="luzEfecto"></div>
    </div>

    <script>
        let yaAbierto = false;

        function abrirInvitacion() {
            if (yaAbierto) return;
            yaAbierto = true;

            const sobre = document.getElementById('sobre');
            const luz = document.getElementById('luzEfecto');
            const texto = document.getElementById('texto');
            
            // EL LINK NUEVO DE DRIVE
            const linkDrive = "https://drive.google.com/file/d/1sWA4ks4dYg3upvneGR3lwRjUnNwGB23s/view?usp=sharing";

            // Iniciar efectos
            sobre.classList.add('abriendo');
            luz.classList.add('animar-luz');
            texto.style.opacity = '0';

            // Redirigir después de la animación
            setTimeout(() => {
                window.location.href = linkDrive;
            }, 1200);
        }
    </script>
</body>
</html>
