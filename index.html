<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Bautizo - Emily Samantha</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #fdfaf7;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            cursor: pointer;
        }

        .instruccion {
            color: #b5835a;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: latido 1.3s infinite;
            text-align: center;
            transition: opacity 0.5s;
        }

        @keyframes latido {
            0% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.5; transform: scale(0.95); }
        }

        .contenedor-sobre {
            position: relative;
            width: 85%;
            max-width: 500px;
        }

        .imagen-sobre {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.8s ease-in-out;
        }

        /* Efecto de apertura */
        .abriendo .imagen-sobre {
            transform: scale(1.8);
            opacity: 0;
            filter: blur(20px);
        }

        /* DESTELLO */
        .luz {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 20;
        }

        .animar-luz {
            animation: destello 1.5s ease-out forwards;
        }

        @keyframes destello {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            40% { transform: translate(-50%, -50%) scale(150); opacity: 1; box-shadow: 0 0 100px 50px white; }
            100% { transform: translate(-50%, -50%) scale(400); opacity: 0; }
        }

        /* MARIPOSAS */
        .mariposa {
            position: absolute;
            width: 35px;
            height: 35px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23f7c1d1" d="M10,30 Q30,10 50,30 Q70,10 90,30 Q100,50 80,70 Q50,90 20,70 Q0,50 10,30 Z M50,30 V70"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
        }

        @keyframes volar {
            0% { transform: translate(-50%, -50%) scale(0.2) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(2.5) rotate(var(--r)); opacity: 0; }
        }
    </style>
</head>
<body onclick="abrirInvitacion()">

    <div class="instruccion" id="texto">✨ TOCA PARA ABRIR ✨</div>

    <div class="contenedor-sobre" id="sobre">
        <img src="sobre.png" alt="Sobre" class="imagen-sobre">
        <div class="luz" id="luzEfecto"></div>
    </div>

    <script>
        let yaAbierto = false;

        function abrirInvitacion() {
            if (yaAbierto) return;
            yaAbierto = true;

            const sobre = document.getElementById('sobre');
            const luz = document.getElementById('luzEfecto');
            const texto = document.getElementById('texto');
            
            const linkDrive = "https://drive.google.com/file/d/1sWA4ks4dYg3upvneGR3lwRjUnNwGB23s/view?usp=sharing";

            // Iniciar efectos visuales
            sobre.classList.add('abriendo');
            luz.classList.add('animar-luz');
            texto.style.opacity = '0';

            // Generar mariposas
            for (let i = 0; i < 25; i++) {
                setTimeout(crearMariposa, i * 40);
            }

            // Redirigir al finalizar la animación
            setTimeout(() => {
                window.location.href = linkDrive;
            }, 1600);
        }

        function crearMariposa() {
            const m = document.createElement('div');
            m.className = 'mariposa';
            const angulo = Math.random() * Math.PI * 2;
            const distancia = 380 + Math.random() * 500;
            const x = Math.cos(angulo) * distancia + "px";
            const y = Math.sin(angulo) * distancia + "px";
            const r = (Math.random() * 800) + "deg";

            m.style.setProperty('--x', x);
            m.style.setProperty('--y', y);
            m.style.setProperty('--r', r);
            m.style.left = "50%";
            m.style.top = "50%";
            m.style.animation = "volar 3.5s ease-out forwards";
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 3500);
        }
    </script>
</body>
</html>
